name: Deploy GenAI Microservices
on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO_NAME: my-genai-repo
  AR_HOST: us-central1-docker.pkg.dev

jobs:
  # --- STAGE 1: BUILD+DEPLOY RESEARCHER & WRITER ---
  deploy-nodes:
    runs-on: ubuntu-latest
    outputs:
      researcher_url: ${{ steps.deploy-res.outputs.url }}
      writer_url: ${{ steps.deploy-wri.outputs.url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      # ---- Researcher: build & push ----
      - name: Build & Push Researcher
        run: |
          docker build -t ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/researcher:latest ./researcher
          docker push ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/researcher:latest

      - id: deploy-res
        name: Deploy Researcher
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: researcher-service
          image: ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/researcher:latest
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated

      # ---- Writer: build & push ----
      - name: Build & Push Writer
        run: |
          docker build -t ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/writer:latest ./writer
          docker push ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/writer:latest

      - id: deploy-wri
        name: Deploy Writer
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: writer-service
          image: ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/writer:latest
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated
          env_vars: GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

  # --- STAGE 2: BUILD+DEPLOY ORCHESTRATOR WITH DYNAMIC URLS ---
  deploy-orchestrator:
    needs: deploy-nodes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Build & Push Orchestrator
        run: |
          docker build -t ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/orchestrator:latest ./orchestrator
          docker push ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/orchestrator:latest

      - name: Deploy Orchestrator
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: orchestrator-service
          image: ${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/orchestrator:latest
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated
          env_vars: |
            RESEARCHER_URL=${{ needs.deploy-nodes.outputs.researcher_url }}
            WRITER_URL=${{ needs.deploy-nodes.outputs.writer_url }}